name: CI/CD Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  deprecated-check:
    name: Deprecated Code Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Pylint
        run: |
          pip install pylint

      - name: Run strict deprecated code detection
        run: |
          echo "🔍 Checking for deprecated code..."
          cd backend
          python -m pylint . --rcfile=.pylintrc --fail-on=deprecated

  backend:
    name: Test Django Backend
    runs-on: ubuntu-latest
    needs: deprecated-check
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          cd backend
          python manage.py test

  frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build
        run: |
          cd frontend/v2
          npm install
          npm run build