# Este arquivo sobrescreve configurações para desenvolvimento
# Docker Compose detecta automaticamente arquivos .override.yml

version: "3.9"

services:
  django:
    volumes:
      - ..:/workspace:cached
      - /workspace/node_modules
    working_dir: /workspace
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=development
    # Para dev, você executa manualmente:
    # Terminal 1: cd backend && python manage.py runserver
    # Terminal 2: cd frontend/v2 && npm run dev

  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
